<!DOCTYPE html>
<html lang="en" class="dark">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="./attendx-logo.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    content="ATTENDX — Intelligent Presence Verification Platform with AI-powered face biometrics, GPS validation, and campus verification." />
  <meta name="theme-color" content="#0E1117" />
  <title>ATTENDX</title>
  <script>
    // Prevent flash: apply saved theme (default=dark)
    const theme = localStorage.getItem('attendx-theme');
    if (theme === 'light') {
      document.documentElement.classList.remove('dark');
    } else {
      document.documentElement.classList.add('dark');
    }
  </script>
  <script type="text/javascript">
    // GitHub Pages SPA redirect handler
    (function(l) {
      if (l.search[1] === '/' ) {
        var decoded = l.search.slice(1).split('&').map(function(s) {
          return s.replace(/~and~/g, '&')
        }).join('?');
        window.history.replaceState(null, null,
          l.pathname.slice(0, -1) + decoded + l.hash
        );
      }
    }(window.location))
  </script>
  <style>
    html.dark,
    html.dark body {
      background: #0E1117;
    }

    html:not(.dark),
    html:not(.dark) body {
      background: #F8F9FB;
    }
  </style>
