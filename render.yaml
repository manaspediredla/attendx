services:
  # Backend API
  - type: web
    name: attendx-api
    runtime: python
    region: oregon
    rootDir: backend
    buildCommand: pip install -r requirements-prod.txt
    startCommand: gunicorn run:app --bind 0.0.0.0:$PORT --timeout 120 --workers 2
    plan: free
    envVars:
      - key: FLASK_ENV
        value: production
      - key: FLASK_DEBUG
        value: "0"
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: SUPER_ADMIN_WHITELISTED_IPS
        value: ""
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: DATABASE_URL
        fromDatabase:
          name: attendx-db
          property: connectionString

  # Frontend Static Site
  - type: web
    name: attendx-app
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    plan: free
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: attendx-db
    plan: free
    region: oregon
