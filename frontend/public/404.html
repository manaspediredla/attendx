<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>ATTENDX</title>
    <script type="text/javascript">
      // SPA redirect for GitHub Pages
      // Redirects all 404s back to index.html with the path preserved in the URL
      var repo = '/attendx';
      var fullPath = window.location.pathname;
      // Store the intended path so the SPA can route correctly
      sessionStorage.setItem('spa-redirect-path', fullPath);
      // Redirect to the root of the app
      window.location.replace(repo + '/');
    </script>
  </head>
  <body></body>
</html>
